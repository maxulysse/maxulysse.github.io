name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # TODO: Remove --legacy-peer-deps when @astrojs/check supports TypeScript 6.
        run: npm ci --legacy-peer-deps

      - name: Run Astro type check
        run: npm run check

      - name: Run markdown lint
        run: npm run lint:md

  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # TODO: Remove --legacy-peer-deps when @astrojs/check supports TypeScript 6.
        run: npm ci --legacy-peer-deps

      - name: Install prek
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/j178/prek/releases/download/v0.3.3/prek-installer.sh | sh

      - name: Add prek to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install prek hooks
        run: prek install-hooks

      - name: Run prek hooks
        run: prek run --all-files
